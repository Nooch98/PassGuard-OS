<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PassGuard OS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>PassGuard OS</h1>
        <button id="refreshBtn" class="btn secondary">Refresh</button>
      </header>

      <section class="panel">
        <div class="row">
          <span class="label">Status</span>
          <span id="statusText" class="value">Checking...</span>
        </div>
        <div class="row">
          <span class="label">Origin</span>
          <span id="originText" class="value">-</span>
        </div>
        <div class="row">
          <span class="label">Session</span>
          <span id="sessionText" class="value">-</span>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Credentials</h2>
        </div>

        <div class="security-note">
          Autofill is convenient, but manual copy may be safer on unusual or
          sensitive login pages.
        </div>

        <div id="credentialsList" class="credentials-list">
          <div class="empty">No data loaded yet.</div>
        </div>
      </section>

      <section class="actions">
        <button id="loadBtn" class="btn primary">Load Credentials</button>
        <button id="lockBtn" class="btn danger">Lock Vault</button>
      </section>

      <section id="messageBox" class="message hidden"></section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
